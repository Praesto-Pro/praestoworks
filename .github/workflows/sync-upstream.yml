name: Sync Upstream

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-master
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/master into master
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/chez42/praestoworks.git || git remote set-url upstream https://github.com/chez42/praestoworks.git
          git fetch upstream master

      - name: Merge upstream if clean
        run: |
          if ! git merge --no-edit upstream/master; then
            git merge --abort || true
            echo "::error::upstream/master could not be merged cleanly into master. Resolve conflicts manually, then rerun this workflow."
            exit 1
          fi

      - name: Push synced master
        run: git push origin HEAD:master
